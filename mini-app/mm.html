<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindmap</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f8f9fa; font-family:'Segoe UI',system-ui,sans-serif; }
.loading { display:flex; align-items:center; justify-content:center; height:100vh; flex-direction:column; gap:12px; color:#555; }
.loading .spinner { width:36px; height:36px; border:3px solid #ddd; border-top-color:#4a9eff; border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
#mmWrap { width:100%; min-height:100vh; background:#fff; }
.markmap { width:100%; height:100vh; }
.markmap svg { width:100%; height:100%; }
.error { color:#c33; text-align:center; padding:40px 20px; }
</style>
</head>
<body>
<div id="loading" class="loading"><div class="spinner"></div><div>Đang tải mindmap...</div></div>
<div id="mmWrap" style="display:none"></div>
<div id="error" class="error" style="display:none"></div>

<script>
window.markmap = { autoLoader: { manual: true, toolbar: true } };
</script>
<script src="https://cdn.jsdelivr.net/npm/markmap-autoloader@latest"></script>
<script>
const SB_URL = 'https://smzoomekyvllsgppgvxw.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtem9vbWVreXZsbHNncHBndnh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyODg3MjcsImV4cCI6MjA4ODg2NDcyN30.TJ1BPyG8IlnxPSClIlJoOCpYUMhHHBmyL3cKFoXBJBY';

async function sbGet(path) {
  const r = await fetch(SB_URL + path, { headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY } });
  return r.json();
}

function fmt(t, w) { if(!t) return ''; t=String(t).replace(/\n+/g,' ').trim(); return t.length<=w?t:t.substring(0,w-1)+'\u2026'; }
function mdS(t, lim) {
  if(!t) return '';
  if(Array.isArray(t)) t=t.join(', ');
  var ss=t.match(/[^.!?\n]+[.!?\n]*/g);
  if(!ss) return '- '+fmt(t,lim||55)+'\n';
  return ss.map(function(s){return '- '+fmt(s.trim(),lim||55)+'\n';}).join('');
}

async function init() {
  try {
    const params = new URLSearchParams(location.search);
    const pid = params.get('id');
    const gid = params.get('gid');
    let profileId = pid;

    // If group_id provided, look up profile
    if (!profileId && gid) {
      const fg = await sbGet('/rest/v1/fruit_groups?telegram_group_id=eq.' + gid + '&select=profile_id');
      if (fg && fg.length > 0) profileId = fg[0].profile_id;
    }
    if (!profileId) throw new Error('No profile');

    // Fetch profile + form data
    const [profiles, sheets] = await Promise.all([
      sbGet('/rest/v1/profiles?id=eq.' + profileId + '&select=full_name,phase,is_kt_opened'),
      sbGet('/rest/v1/form_hanh_chinh?profile_id=eq.' + profileId + '&select=data')
    ]);

    const p = profiles[0] || {};
    const d = (sheets && sheets.length > 0 && sheets[0].data) ? sheets[0].data : {};
    const name = p.full_name || 'Hồ sơ';

    // Build markmap markdown (same logic as mindmap.js renderInfoMM)
    var md = '# ' + name + '\n';

    // 1. Nhân thân & Nền tảng
    var dm = [
      d.t2_nam_sinh ? 'Sinh: '+d.t2_nam_sinh : null,
      d.t2_gioi_tinh ? 'Giới tính: '+d.t2_gioi_tinh : null,
      d.t2_nghe_nghiep ? 'Nghề: '+d.t2_nghe_nghiep : null,
      d.t2_hon_nhan ? 'Hôn nhân: '+(Array.isArray(d.t2_hon_nhan)?d.t2_hon_nhan.join(', '):d.t2_hon_nhan) : null,
      d.t2_quan_he_ndd ? 'Quan hệ với NĐD: '+(Array.isArray(d.t2_quan_he_ndd)?d.t2_quan_he_ndd.join(', '):d.t2_quan_he_ndd) : null,
      d.t2_khong_gian_song ? 'Ở chung: '+(Array.isArray(d.t2_khong_gian_song)?d.t2_khong_gian_song.join(', '):d.t2_khong_gian_song) : null,
      d.t2_dia_chi ? 'Nơi ở hiện tại: '+d.t2_dia_chi : null,
      d.t2_que_quan ? 'Nhà ba mẹ (Quê): '+d.t2_que_quan : null
    ].filter(Boolean);
    if (dm.length) { md += '## 🏛️ Nhân thân & Nền tảng\n'; dm.forEach(function(v){md+='- '+fmt(v,45)+'\n';}); }

    // 2. Gia đình
    if (d.t2_nguoi_than) md += '## 🏡 Gia đình & Hoàn cảnh\n### 👨‍👩‍👧‍👦 Hoàn cảnh gia đình\n' + mdS(d.t2_nguoi_than,55);

    // 3. Hệ tư tưởng
    var tt='';
    if (d.t2_ton_giao) tt+='- **Tôn giáo:** '+(Array.isArray(d.t2_ton_giao)?d.t2_ton_giao.join(', '):d.t2_ton_giao)+'\n';
    if (d.t2_quan_diem) tt+=mdS(d.t2_quan_diem,55);
    if (tt) md += '## ⚖️ Hệ tư tưởng & Niềm tin\n' + tt;

    // 4. Chiều sâu nội tâm
    var tl='';
    if (d.t2_tinh_cach) tl+='### 🧩 Tính cách\n'+mdS(d.t2_tinh_cach,50);
    if (d.t2_so_thich) tl+='### 🎨 Đam mê / Sở thích\n'+mdS(d.t2_so_thich,50);
    if (d.t2_du_dinh) tl+='### 🚀 Khát vọng / Dự định\n'+mdS(d.t2_du_dinh,50);
    if (tl) md += '## 🌊 Chiều sâu nội tâm\n' + tl;

    // 5. Góc khuất
    var qk='';
    if (d.t2_nguoi_quan_trong) qk+='### 👥 Người quan trọng nhất\n'+mdS(d.t2_nguoi_quan_trong,50);
    if (d.t2_chuyen_cu) qk+='### 📖 Câu chuyện dấu ấn\n'+mdS(d.t2_chuyen_cu,50);
    if (qk) md += '## ⛓️ Góc khuất & Ràng buộc\n' + qk;

    // 6. Lưu ý
    if (d.t2_luu_y) md += '## ⚠️ Lưu ý đặc biệt\n' + mdS(d.t2_luu_y,55);

    if (md.trim() === '# '+name) md += '## 📋 Chưa có dữ liệu\n';

    // Render
    document.getElementById('loading').style.display = 'none';
    var wrap = document.getElementById('mmWrap');
    wrap.style.display = 'block';
    wrap.innerHTML = '<div class="markmap"><script type="text/template">' + md + '<\/script></div>';
    if (window.markmap && window.markmap.autoLoader) {
      window.markmap.autoLoader.renderAll();
    }
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = 'Lỗi: ' + e.message;
  }
}
init();
</script>
</body>
</html>
