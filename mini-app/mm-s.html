<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindmap</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;font-family:'Segoe UI',system-ui,sans-serif}
.markmap{width:100%;height:100vh}
.markmap svg{width:100%;height:100%}
</style>
</head>
<body>
<div id="mm" class="markmap"></div>
<script>
window.markmap={autoLoader:{manual:true,toolbar:false}};
</script>
<script src="https://cdn.jsdelivr.net/npm/markmap-autoloader@latest"></script>
<script>
try {
  var h = location.hash.substring(1);
  // Restore URL-safe base64: - → +, _ → /, add padding
  h = h.replace(/-/g,'+').replace(/_/g,'/');
  while(h.length%4) h+='=';
  // Decode base64 to UTF-8 bytes
  var bin = atob(h);
  var bytes = new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  var md = new TextDecoder().decode(bytes);
  var el = document.getElementById('mm');
  el.innerHTML = '<script type="text/template">' + md + '<\/script>';
  if(window.markmap && window.markmap.autoLoader) window.markmap.autoLoader.renderAll();
} catch(e) { document.body.innerHTML = 'Error: ' + e.message; }
</script>
</body>
</html>
