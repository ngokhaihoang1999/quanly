<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindmap</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#fff;font-family:'Segoe UI',system-ui,sans-serif;width:100%;height:100%;overflow:hidden}
#mindmap{width:100%;height:100vh;display:block}
</style>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-view@0.18"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.18"></script>
</head>
<body>
<svg id="mindmap"></svg>
<script>
try {
  var params = new URLSearchParams(location.search);
  var h = params.get('d') || location.hash.substring(1);
  if(!h) throw new Error('No data');
  h = h.replace(/-/g,'+').replace(/_/g,'/');
  while(h.length%4) h+='=';
  var bin = atob(h);
  var bytes = new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  var md = new TextDecoder().decode(bytes);
  
  // Use markmap programmatic API for full control
  var transformer = new markmap.Transformer();
  var result = transformer.transform(md);
  var root = result.root;
  
  var svg = document.getElementById('mindmap');
  var mm = markmap.Markmap.create(svg, {
    initialExpandLevel: -1,  // expand ALL nodes
    duration: 0,             // no animation (instant render for screenshot)
    maxWidth: 400,           // max node text width
    paddingX: 16,
    autoFit: true,
    zoom: true,
    pan: true
  }, root);
  
  // Force fit after render
  setTimeout(function() { mm.fit(); }, 300);
  setTimeout(function() { mm.fit(); }, 1000);
} catch(e) {
  document.write('<p style="padding:20px;color:red">Error: '+e.message+'</p>');
}
</script>
</body>
</html>
