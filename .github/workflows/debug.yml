name: Debug DB Push
on: [push]
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: supabase/setup-cli@v1
      - name: Link and Push Migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref smzoomekyvllsgppgvxw --password $SUPABASE_DB_PASSWORD
          supabase db push > db_push_log.txt 2>&1 || true
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add db_push_log.txt
          git commit -m "log db push error" || true
          git push || true
