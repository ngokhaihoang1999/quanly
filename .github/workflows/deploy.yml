name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Deploy Function to Supabase Edge
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: smzoomekyvllsgppgvxw
        run: |
          supabase functions deploy telegram-bot --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt

      - name: Re-register Telegram Webhook (enable my_chat_member)
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SUPABASE_PROJECT_ID: smzoomekyvllsgppgvxw
        run: |
          WEBHOOK_URL="https://${SUPABASE_PROJECT_ID}.supabase.co/functions/v1/telegram-bot"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/setWebhook" \
            -H "Content-Type: application/json" \
            -d "{\"url\":\"${WEBHOOK_URL}\",\"allowed_updates\":[\"message\",\"callback_query\",\"my_chat_member\"]}"
